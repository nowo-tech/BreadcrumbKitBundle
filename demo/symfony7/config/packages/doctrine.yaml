doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '8.0'
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            NowoBreadcrumbKitBundle:
                is_bundle: true
                type: attribute
                dir: Entity
                prefix: 'Nowo\BreadcrumbKitBundle\Entity'
                alias: NowoBreadcrumbKitBundle
