nowo_breadcrumb_kit:
    locales: ['en', 'es']
    default_locale: 'en'
    default_collection: 'default'
    cache:
        ttl: 60
        pool: cache.app
    inline_edit:
        query_param: breadcrumb_edit
        access_services:
            demo_public: App\Breadcrumb\DemoBreadcrumbInlineEditAccess
            demo_staff_only: App\Breadcrumb\DemoStaffOnlyBreadcrumbInlineEditAccess
    dashboard:
        enabled: true
        path_prefix: /breadcrumb-kit-admin
